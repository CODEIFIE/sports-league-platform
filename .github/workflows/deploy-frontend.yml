name: Deploy frontend to Hostinger

# Builds the React app and uploads dist/ to Hostinger public_html over FTP.
# Runs on every change to the frontend (and can be triggered manually).
# Disabled auto-run: Hostinger FTP is unreachable for this account.
# Kept for manual use if FTP is ever enabled. Run via the Actions tab if needed.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 60000
          local-dir: ./frontend/dist/
          server-dir: ./
          dangerous-clean-slate: false
